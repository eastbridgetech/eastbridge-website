<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
<title id="title">Emerging Technologies and AI Agents</title>
<desc id="desc">A futuristic EastBridge visual showing AI agents, cloud systems, automation, data, ERP and CRM connected through a bridge-like enterprise network.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#1b6fd1"/><stop offset=".52" stop-color="#2fa8d3"/><stop offset="1" stop-color="#20c7b0"/></linearGradient>
  <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#0b2f68" stop-opacity=".58"/><stop offset="1" stop-color="#081f4e" stop-opacity=".25"/></linearGradient>
  <linearGradient id="glow" x1="0" x2="1"><stop offset="0" stop-color="#6fe8f2"/><stop offset="1" stop-color="#7cc63b"/></linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#071f4e" flood-opacity=".28"/></filter>
</defs>
<rect width="900" height="560" fill="url(#bg)"/>
<rect x="70" y="54" width="760" height="452" rx="42" fill="url(#card)" stroke="rgba(255,255,255,.25)" filter="url(#shadow)"/>
<path d="M120 410 C260 275 392 260 520 316 S735 315 790 182" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="78"/>
<path d="M145 355 C285 210 435 205 560 295 S725 300 785 205" fill="none" stroke="#071f4e" stroke-width="10" stroke-linecap="round"/>
<path d="M145 355 C285 210 435 205 560 295 S725 300 785 205" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linecap="round"/>
<g opacity=".28" stroke="#fff"><path d="M170 112h560"/><path d="M170 175h560"/><path d="M170 238h560"/><path d="M170 301h560"/><path d="M170 364h560"/><path d="M230 92v330"/><path d="M350 92v330"/><path d="M470 92v330"/><path d="M590 92v330"/><path d="M710 92v330"/></g>
<g filter="url(#soft)">
  <circle cx="145" cy="355" r="9" fill="#6fe8f2"/><circle cx="315" cy="238" r="7" fill="#0b63ce"/><circle cx="470" cy="250" r="7" fill="#14a9bd"/><circle cx="620" cy="315" r="7" fill="#7cc63b"/><circle cx="785" cy="205" r="9" fill="#6fe8f2"/>
</g>
<g font-family="Inter, Arial, sans-serif" text-anchor="middle" fill="#fff">
  <text x="450" y="112" font-size="24" font-weight="900" letter-spacing="10">EASTBRIDGE</text>
  <text x="450" y="142" font-size="13" font-weight="900" letter-spacing="5">TECHNOLOGIES</text>
  <circle cx="450" cy="278" r="74" fill="#071f4e" fill-opacity=".72" stroke="#6fe8f2" stroke-opacity=".45"/>
  <text x="450" y="266" font-size="26" font-weight="900">AI Agents</text>
  <text x="450" y="293" font-size="13" font-weight="800" letter-spacing="2">SMART ENTERPRISE</text>
</g>
<g font-family="Inter, Arial, sans-serif" font-weight="900" fill="#fff" text-anchor="middle">
  <rect x="145" y="396" width="130" height="54" rx="14" fill="rgba(255,255,255,.14)" stroke="rgba(255,255,255,.34)"/><text x="210" y="429" font-size="15">ERP</text>
  <rect x="298" y="424" width="130" height="54" rx="14" fill="rgba(7,31,78,.34)" stroke="rgba(255,255,255,.28)"/><text x="363" y="457" font-size="15">CRM</text>
  <rect x="452" y="396" width="130" height="54" rx="14" fill="rgba(255,255,255,.14)" stroke="rgba(255,255,255,.34)"/><text x="517" y="429" font-size="15">DATA</text>
  <rect x="606" y="424" width="130" height="54" rx="14" fill="rgba(7,31,78,.34)" stroke="rgba(255,255,255,.28)"/><text x="671" y="457" font-size="15">AUTOMATION</text>
  <rect x="642" y="348" width="130" height="54" rx="14" fill="rgba(255,255,255,.14)" stroke="rgba(255,255,255,.34)"/><text x="707" y="381" font-size="15">CLOUD</text>
</g>
<g opacity=".85"><rect x="250" y="88" width="8" height="62" rx="4" fill="#071f4e"/><rect x="318" y="74" width="8" height="92" rx="4" fill="#0b63ce"/><rect x="388" y="60" width="8" height="128" rx="4" fill="#14a9bd"/><rect x="558" y="78" width="8" height="90" rx="4" fill="#19b68a"/><rect x="628" y="100" width="8" height="66" rx="4" fill="#7cc63b"/></g>
</svg>
